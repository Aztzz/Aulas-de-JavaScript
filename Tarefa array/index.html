<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Sistema de Cadastro de Produtos</h1>
    </header>
    <main>
        <div class="card">
            <label for="Produto">Nome do produto:</label>
            <input type="text" id="produto" placeholder="Digite o nome do produto">
            <label for="Preco">Preço:</label>
            <input type="number" id="preco" placeholder="Digite o preço">
            <button onclick="cadastrarProduto ()">Cadastrar</button>
            <button onclick="removerUltimoProduto ()">Remover Último produto</button>

            <p id="mensagem"></p>

                        <h2>Produtos cadastrado</h2>
            <p id="ListaCadastrados"></p>
            <h2>Quantidade de produtos cadastrado</h2>
            <p id="quantidade"></p>
            <h2>Valor total de todos os produtos</h2>
            <p id="valortotal"></p>

        </div>

        <div class="card">
            <button onclick="caro()">Exibir o produto mais caro cadastrado.</button>
        </div>

    </main>
            <script src="script.js"></script>
</body>
</html>
